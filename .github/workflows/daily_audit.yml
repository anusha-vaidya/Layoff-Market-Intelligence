name: Daily Labor Intelligence Audit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # This line creates the blue button!

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This tells GitHub explicitly that this script can save files
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas yfinance duckdb pyarrow

      - name: Run Ingestion Engine
        run: python src/ingestion.py

      - name: Commit data update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/layoff_intelligence.db
          git commit -m "auto: daily data sync" || echo "No changes to commit"
          git push
