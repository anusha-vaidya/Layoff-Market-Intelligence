name: Daily Labor Intelligence Audit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas yfinance duckdb pyarrow

      - name: Run Ingestion Engine
        run: python src/ingestion.py

      - name: Commit data update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Only commit if the file actually exists and has changed
          if [ -f data/layoff_intelligence.db ]; then
            git add data/layoff_intelligence.db
            git commit -m "auto: daily data sync" || echo "No changes to commit"
            git push
          else
            echo "Database file not found. Skipping commit."
            exit 1
          fi
